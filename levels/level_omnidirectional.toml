# Omnidirectional test level.
#
# Three axis-aligned fans each cover the entire playing field.
# This gives the solver the ability to add ANY thrust vector it likes,
# which should mean a zero error for every problem we throw at it
# (given enough time).

[params]
N         = 21
H         = 10
dt        = 0.15
alpha_max = 80.0

[start]
r0     = [-10.0,  0.0,  10.0]
v0     = [3.0,  0.0,  4.5]
r_goal = [45.0, 10.0,  -25.5]

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [1.0, 0.0, 0.0]
color     = "#E74C3C"
name      = "Fan X (+x)"

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [0.0, 1.0, 0.0]
color     = "#2ECC71"
name      = "Fan Y (+y)"

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [0.0, 0.0, 1.0]
color     = "#3498DB"
name      = "Fan Z (+z)"
