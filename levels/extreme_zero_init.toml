# Extreme case 3: zero initial velocity — solver provides all momentum.
#
# The ball starts stationary; without any fans it simply falls straight down.
# Every meter of displacement toward the goal must come entirely from thrust.
# This is the purest demonstration that 3 linearly independent fans spanning
# all of R^3 make the problem fully actuated regardless of initial conditions.

[params]
N         = 25
H         = 12
dt        = 0.10
alpha_max = 80.0

[start]
r0     = [ 0.0,  0.0, 5.0]
v0     = [ 0.0,  0.0, 0.0]
r_goal = [25.0, 25.0, 5.0]

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [1.0, 0.0, 0.0]
color     = "#E74C3C"
name      = "Fan X"

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [0.0, 1.0, 0.0]
color     = "#2ECC71"
name      = "Fan Y"

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [0.0, 0.0, 1.0]
color     = "#3498DB"
name      = "Fan Z"
