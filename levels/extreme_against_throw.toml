# Extreme case 1: goal is directly behind the throw direction.
#
# The ball is launched hard in +x, but the goal sits in the -x half-space.
# The solver must first arrest the initial momentum and then drive the ball
# backward — something impossible without thrust.  The 3 omnidirectional fans
# guarantee a solution exists; this level just asks for a dramatic one.

[params]
N         = 25
H         = 12
dt        = 0.10
alpha_max = 80.0

[start]
r0     = [ 0.0,  0.0, 2.0]
v0     = [10.0,  0.0, 0.0]
r_goal = [-30.0, 0.0, 2.0]

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [1.0, 0.0, 0.0]
color     = "#E74C3C"
name      = "Fan X (+x)"

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [0.0, 1.0, 0.0]
color     = "#2ECC71"
name      = "Fan Y (+y)"

[[fans]]
bounds    = [[-100.0, 100.0], [-100.0, 100.0], [-100.0, 100.0]]
direction = [0.0, 0.0, 1.0]
color     = "#3498DB"
name      = "Fan Z (+z)"
