# Extreme case 4: goal far away — sustained thrust required throughout.
#
# The goal is placed far enough that even if the solver applies maximum thrust
# in the goal direction at every single step it barely reaches in time.
# This stresses the horizon H and shows the MPC replanning correctly as the
# ball accelerates toward the distant target.

[params]
N         = 30
H         = 15
dt        = 0.12
alpha_max = 80.0

[start]
r0     = [  0.0,   0.0, 2.0]
v0     = [  0.0,   0.0, 0.0]
r_goal = [70.0,  70.0, 2.0]

[[fans]]
bounds    = [[-200.0, 200.0], [-200.0, 200.0], [-200.0, 200.0]]
direction = [1.0, 0.0, 0.0]
color     = "#E74C3C"
name      = "Fan X (+x)"

[[fans]]
bounds    = [[-200.0, 200.0], [-200.0, 200.0], [-200.0, 200.0]]
direction = [0.0, 1.0, 0.0]
color     = "#2ECC71"
name      = "Fan Y (+y)"

[[fans]]
bounds    = [[-200.0, 200.0], [-200.0, 200.0], [-200.0, 200.0]]
direction = [0.0, 0.0, 1.0]
color     = "#3498DB"
name      = "Fan Z (+z)"
